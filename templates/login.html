<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Вход - Site Scraper</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f0f0f;
      min-height: 100vh;
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .login-box {
      background: #1a1a1a;
      border-radius: 16px;
      padding: 40px;
      width: 100%;
      max-width: 380px;
      border: 1px solid #2a2a2a;
    }

    .logo {
      text-align: center;
      font-size: 1.8em;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .tagline {
      text-align: center;
      color: #666;
      font-size: 0.9em;
      margin-bottom: 32px;
    }

    .form-group {
      margin-bottom: 20px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      font-weight: 500;
      color: #999;
      font-size: 0.85em;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    input[type="password"] {
      width: 100%;
      padding: 14px 16px;
      border: 1px solid #333;
      border-radius: 10px;
      font-size: 16px;
      background: #0f0f0f;
      color: #fff;
      transition: border-color 0.2s;
    }

    input[type="password"]:focus {
      outline: none;
      border-color: #4f46e5;
    }

    .submit-btn {
      width: 100%;
      padding: 14px;
      background: #4f46e5;
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }

    .submit-btn:hover {
      background: #4338ca;
    }

    .error {
      background: #3a1a1a;
      color: #f87171;
      padding: 12px 16px;
      border-radius: 10px;
      margin-bottom: 20px;
      border: 1px solid #4a2a2a;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="login-box">
    <div class="logo">Site Scraper</div>
    <div class="tagline">Введите пароль для входа</div>

    {% if error %}
      <div class="error">{{ error }}</div>
    {% endif %}

    <form method="post">
      <div class="form-group">
        <label>Пароль</label>
        <input type="password" name="password" required autofocus placeholder="Введите пароль">
      </div>
      <button type="submit" class="submit-btn">Войти</button>
    </form>
  </div>
</body>
</html>
